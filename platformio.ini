; Core2WiFiScanner — CYDWiFiScanner ported to M5Stack Core2
[env:m5stack-core2]
platform       = espressif32
board          = m5stack-core2
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600
board_build.partitions = huge_app.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
lib_deps =
    m5stack/M5Core2@^0.1.9
